<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCENTRA | Craftrise</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --yellow: #ffcc00;
            --blue: #0055ff;
            --text: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-top: 70px; /* Navbar için boşluk */
        }

        /* --- NAVBAR --- */
        nav {
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 2px solid var(--yellow);
            position: fixed;
            top: 0; width: 100%;
            z-index: 1000;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        nav a:hover { color: var(--blue); }
        nav a.active { color: var(--yellow); border-bottom: 2px solid var(--yellow); }

        /* --- RGB BAŞLIK --- */
        @keyframes rgb-flow {
            0% { color: #ff0000; text-shadow: 0 0 15px #ff0000; }
            33% { color: #00ff00; text-shadow: 0 0 15px #00ff00; }
            66% { color: #0000ff; text-shadow: 0 0 15px #0000ff; }
            100% { color: #ff0000; text-shadow: 0 0 15px #ff0000; }
        }

        .hero {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle, rgba(0,85,255,0.1) 0%, rgba(10,10,10,1) 100%);
        }

        .hero h1 {
            font-size: 5rem;
            animation: rgb-flow 5s infinite linear;
            margin: 0;
            letter-spacing: 5px;
        }

        /* --- İÇERİK KARTLARI --- */
        .container { max-width: 1000px; margin: auto; padding: 40px 20px; }
        
        .section-card {
            background: var(--card);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            border-left: 5px solid var(--blue);
        }

        h2 { color: var(--yellow); border-bottom: 1px solid #333; padding-bottom: 10px; }

        .stat-box {
            display: inline-block;
            background: var(--blue);
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="active">Ana Sayfa</a>
    <a href="kadro.html">Kadro</a>
    <a href="kurallar.html">Kurallar</a>
    <a href="basarilar.html">Başarılar</a>
    <a href="indir.html">Dosyalar</a>
    <a href="basvuru.html">Başvuru</a>
</nav>

<div class="hero">
    <h1>ASCENTRA</h1>
    <p style="color: var(--yellow); letter-spacing: 2px;">GÜÇ, SADAKAT, ZAFER</p>
</div>

<div class="container">
    <div class="section-card">
        <h2>Hakkımızda</h2>
        <p>Craftrise dünyasında adaleti ve gücü temsil eden ASCENTRA, 300 kişilik dev kadrosuyla rakiplerine korku salıyor.</p>
        <div class="stat-box"><i class="fas fa-users"></i> 300+ Üye</div>
        <div class="stat-box"><i class="fas fa-bolt"></i> Aktif Ekip</div>
    </div>
</div>

</body>
</html>
